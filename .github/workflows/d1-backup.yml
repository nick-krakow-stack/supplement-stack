name: D1 Daily Backup

on:
  schedule:
    - cron: '0 3 * * *'   # täglich 03:00 UTC
  workflow_dispatch:        # manueller Trigger zum Testen

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Export D1 database
        run: |
          BACKUP_FILE="d1-backup-${{ github.run_id }}-$(date +%Y%m%d).sql"
          npx wrangler d1 export supplementstack-production --remote --output "$BACKUP_FILE"
          echo "BACKUP_FILE=$BACKUP_FILE" >> "$GITHUB_ENV"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload backup as artifact (30-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BACKUP_FILE }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 30
