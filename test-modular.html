<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modular Architecture Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-center mb-8 text-gray-800">
            <i class="fas fa-cubes mr-2 text-blue-600"></i>
            Modular Architecture Test
        </h1>
        
        <!-- Mode Indicator -->
        <div id="mode-indicator" class="bg-white rounded-lg shadow-lg p-6 mb-8">
            <h2 class="text-xl font-semibold mb-4">Current Mode</h2>
            <div id="mode-display" class="text-lg">Loading...</div>
            <div id="permissions-display" class="mt-4 text-sm text-gray-600">Checking permissions...</div>
        </div>
        
        <!-- Stack Selector -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-8">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold">Stack Management</h2>
                <div class="flex gap-2">
                    <button id="demo-create-stack-main" class="bg-green-600 text-white px-4 py-2 rounded-md hover:bg-green-700 transition-colors text-sm font-medium shadow-sm">
                        <i class="fas fa-plus mr-2"></i>Stack erstellen
                    </button>
                    <button id="demo-add-product-main" class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 transition-colors text-sm font-medium shadow-sm">
                        <i class="fas fa-capsules mr-2"></i>Produkt hinzufügen
                    </button>
                    <button id="demo-delete-stack-main" disabled class="bg-gray-400 text-white px-4 py-2 rounded-md transition-colors text-sm font-medium shadow-sm cursor-not-allowed">
                        <i class="fas fa-trash mr-2"></i>Stack löschen
                    </button>
                </div>
            </div>
            
            <select id="stack-selector" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 shadow-sm">
                <option value="">Stack auswählen...</option>
            </select>
        </div>
        
        <!-- Stack Grid -->
        <div class="bg-white rounded-lg shadow-lg p-6">
            <h2 class="text-xl font-semibold mb-4">Stack Inhalte</h2>
            <div id="demo-stack-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="col-span-full text-center py-8 text-gray-500">Lade Daten...</div>
            </div>
        </div>
        
        <!-- Test Controls -->
        <div class="bg-white rounded-lg shadow-lg p-6 mt-8">
            <h2 class="text-xl font-semibold mb-4">Test Controls</h2>
            <div class="flex gap-4">
                <button id="test-demo-mode" class="bg-yellow-600 text-white px-4 py-2 rounded-md hover:bg-yellow-700 transition-colors">
                    Test Demo Mode
                </button>
                <button id="test-production-mode" class="bg-purple-600 text-white px-4 py-2 rounded-md hover:bg-purple-700 transition-colors">
                    Test Production Mode
                </button>
                <button id="test-ui-components" class="bg-indigo-600 text-white px-4 py-2 rounded-md hover:bg-indigo-700 transition-colors">
                    Test UI Components
                </button>
            </div>
        </div>
    </div>

    <!-- Load modular components -->
    <script src="/static/supplement-ui-components.js"></script>
    <script src="/static/supplement-functions.js"></script>
    <script src="/static/supplement-demo.js"></script>
    <script src="/static/supplement-production.js"></script>

    <script>
        // Test script to verify modular architecture
        document.addEventListener('DOMContentLoaded', function() {
            console.log('=== Modular Architecture Test ===');
            
            // Check if all modules are loaded
            const modules = {
                'UI Components': window.supplementUI,
                'Functions': window.supplementFunctions,  
                'Demo App': window.SupplementDemo,
                'Production App': window.SupplementProduction
            };
            
            console.log('Module availability:');
            Object.entries(modules).forEach(([name, module]) => {
                console.log(`- ${name}: ${module ? '✅ Loaded' : '❌ Missing'}`);
            });
            
            // Update mode display
            const modeDisplay = document.getElementById('mode-display');
            const permissionsDisplay = document.getElementById('permissions-display');
            
            if (window.supplementFunctions) {
                const isDemo = window.supplementFunctions.isDemo;
                const isDashboard = window.supplementFunctions.isDashboard;
                
                modeDisplay.innerHTML = `
                    <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium ${isDemo ? 'bg-yellow-100 text-yellow-800' : 'bg-green-100 text-green-800'}">
                        <i class="fas fa-${isDemo ? 'play' : 'database'} mr-2"></i>
                        ${isDemo ? 'Demo Mode' : 'Production Mode'}
                    </span>
                    <span class="ml-4 text-gray-600">
                        Dashboard: ${isDashboard ? 'Yes' : 'No'}
                    </span>
                `;
                
                // Test permissions
                const permissions = [
                    'view_stacks',
                    'view_products', 
                    'create_stack_local',
                    'delete_stack_local',
                    'add_product_local',
                    'delete_product_local'
                ];
                
                const permissionResults = permissions.map(perm => {
                    const allowed = window.supplementFunctions.checkPermission(perm);
                    return `${perm}: ${allowed ? '✅' : '❌'}`;
                });
                
                permissionsDisplay.innerHTML = `<strong>Permissions:</strong><br>${permissionResults.join('<br>')}`;
            }
            
            // Test button handlers
            document.getElementById('test-demo-mode').addEventListener('click', function() {
                if (window.demoApp || window.initializeDemoApp) {
                    console.log('Testing demo mode...');
                    if (!window.demoApp && window.initializeDemoApp) {
                        window.initializeDemoApp();
                    }
                    if (window.supplementUI) {
                        window.supplementUI.showQuickNotification('Demo mode test activated!', 'success');
                    }
                } else {
                    console.error('Demo app not available');
                }
            });
            
            document.getElementById('test-production-mode').addEventListener('click', function() {
                if (window.productionApp || window.initializeProductionApp) {
                    console.log('Testing production mode...');
                    if (!window.productionApp && window.initializeProductionApp) {
                        window.initializeProductionApp();
                    }
                    if (window.supplementUI) {
                        window.supplementUI.showQuickNotification('Production mode test activated!', 'info');
                    }
                } else {
                    console.error('Production app not available');
                }
            });
            
            document.getElementById('test-ui-components').addEventListener('click', function() {
                if (window.supplementUI) {
                    console.log('Testing UI components...');
                    
                    // Test product card rendering
                    const testProduct = {
                        id: 999,
                        name: 'Test Vitamin D3',
                        brand: 'Test Brand',
                        form: 'Kapsel',
                        monthly_cost: 15.99,
                        purchase_price: 29.90,
                        quantity: 60,
                        dosage_per_day: 1,
                        recommended: true
                    };
                    
                    const productHTML = window.supplementUI.renderProductCard(testProduct, { editAllowed: true, deleteAllowed: true });
                    
                    const stackGrid = document.getElementById('demo-stack-grid');
                    if (stackGrid) {
                        stackGrid.innerHTML = `
                            <div class="col-span-full mb-4">
                                <h3 class="text-lg font-medium text-gray-700">Test Product Card:</h3>
                            </div>
                            ${productHTML}
                        `;
                    }
                    
                    window.supplementUI.showQuickNotification('UI Components test completed!', 'success');
                } else {
                    console.error('UI Components not available');
                }
            });
            
            // Initialize appropriate app based on current path
            const currentPath = window.location.pathname;
            console.log('Current path:', currentPath);
            
            if (currentPath.includes('dashboard')) {
                console.log('Initializing production mode...');
                if (window.initializeProductionApp) {
                    window.initializeProductionApp();
                }
            } else {
                console.log('Initializing demo mode...');
                if (window.initializeDemoApp) {
                    window.initializeDemoApp();
                }
            }
            
            console.log('=== Test setup complete ===');
        });
    </script>
</body>
</html>
