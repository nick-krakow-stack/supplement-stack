name = "supplement-stack"
compatibility_date = "2024-09-01"
compatibility_flags = ["nodejs_compat"]

# Environment bindings
[env.production]
name = "supplement-stack"

[env.production.vars]
ENVIRONMENT = "production"

# D1 Database binding for production
[[env.production.d1_databases]]
binding = "DB"
database_name = "supplementstack-production"
database_id = "f1336769-9231-4cfa-a54b-91a261f07b08"

# Secrets (will be set via Cloudflare Dashboard or CLI)
# JWT_SECRET = "your-production-jwt-secret"
# MAILERSEND_API_KEY = "mlsn.b93df73e534656b9e6fecf1dadb07c3b960a19d789482e559ac531b79b8ce745"

[build]
command = "npm run build"
publish = "dist"

# Routes for custom domain
[[routes]]
pattern = "supplementstack.de/*"
custom_domain = true

[[routes]]
pattern = "www.supplementstack.de/*"
custom_domain = true

# Development environment
[env.development]
name = "supplement-stack-dev"

